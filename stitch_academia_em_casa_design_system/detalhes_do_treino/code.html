<script>
    // Simple micro-interaction for the checkboxes
    const checkboxes = document.querySelectorAll('input[type="checkbox"]');
    checkboxes.forEach(cb => {
      cb.addEventListener('change', function() {
        if (this.checked) {
          this.parentElement.parentElement.classList.add('opacity-50');
          this.parentElement.parentElement.style.textDecoration = 'line-through';
        } else {
          this.parentElement.parentElement.classList.remove('opacity-50');
          this.parentElement.parentElement.style.textDecoration = 'none';
        }
      });
    });

    // Animate the timer ring subtly
    let offset = 44;
    const ring = document.getElementById('timer-progress');
    setInterval(() => {
      offset = offset <= 0 ? 175.9 : offset - 0.5;
      ring.setAttribute('stroke-dashoffset', offset);
    }, 100);
  </script>
